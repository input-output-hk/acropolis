x-cardano-node-base: &cardano-node-base
  image: ghcr.io/intersectmbo/cardano-node:10.6.2
  environment:
    CARDANO_BLOCK_PRODUCER: "true"
  restart: unless-stopped

services:
  pool1:
    <<: *cardano-node-base
    container_name: cardano-pool-1
    command:
      - run
      - --topology
      - /node/configs/topology.json
      - --database-path
      - /db
      - --socket-path
      - /db/node.socket
      - --host-addr
      - 0.0.0.0
      - --port
      - "3001"
      - --config
      - /node/configs/config.json
      - --shelley-kes-key
      - /node/keys/kes.skey
      - --shelley-vrf-key
      - /node/keys/vrf.skey
      - --shelley-operational-certificate
      - /node/keys/opcert.cert
    ports:
      - "3001:3001"
    volumes:
      - ./${TESTNET_DIR:-testnet}/pools/1:/node
      - ./${TESTNET_DIR:-testnet}/dbs/pool1:/db

