      - --topology
      - /node/configs/topology.json
      - --database-path
      - /db
      - --socket-path
      - /db/node.socket
      - --host-addr
      - 0.0.0.0
      - --port
      - "3029"
      - --config
      - /node/configs/config.json
      - --shelley-kes-key
      - /node/keys/kes.skey
      - --shelley-vrf-key
      - /node/keys/vrf.skey
      - --shelley-operational-certificate
      - /node/keys/opcert.cert
    ports:
      - "3029:3029"
    volumes:
      - ./${TESTNET_DIR:-testnet}/pools/29:/node
      - ./${TESTNET_DIR:-testnet}/dbs/pool29:/db

  pool30:
    <<: *cardano-node-base
    container_name: cardano-pool-30
    command:
      - run
      - --topology
      - /node/configs/topology.json
      - --database-path
      - /db
      - --socket-path
      - /db/node.socket
      - --host-addr
      - 0.0.0.0
      - --port
      - "3030"
      - --config
      - /node/configs/config.json
      - --shelley-kes-key
      - /node/keys/kes.skey
      - --shelley-vrf-key
      - /node/keys/vrf.skey
      - --shelley-operational-certificate
      - /node/keys/opcert.cert
    ports:
      - "3030:3030"
    volumes:
      - ./${TESTNET_DIR:-testnet}/pools/30:/node
      - ./${TESTNET_DIR:-testnet}/dbs/pool30:/db

  prometheus:
    image: quay.io/prometheus/prometheus:latest
    container_name: testnet-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./${TESTNET_DIR:-testnet}/monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: testnet-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./${TESTNET_DIR:-testnet}/monitoring/grafana:/etc/grafana:ro
      - ./${TESTNET_DIR:-testnet}/monitoring/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_PATHS_CONFIG: /etc/grafana/grafana.ini
    restart: unless-stopped

volumes:
  prometheus-data:
